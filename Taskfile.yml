version: '3'

vars:
  BIN: bin/agent-runtime
  CMD: ./cmd/agent-runtime

tasks:
  build:
    desc: Build binary for the current platform
    cmds:
      - mkdir -p bin
      - go build -ldflags="-s -w -X main.version=dev" -o {{.BIN}} {{.CMD}}

  run:
    desc: Build and run the binary (pass args after --)
    deps: [build]
    cmds:
      - ./{{.BIN}} {{.CLI_ARGS}}

  test:
    desc: Run all tests
    cmds:
      - go test ./...

  vet:
    desc: Run go vet
    cmds:
      - go vet ./...

  check:
    desc: Run vet and tests
    cmds:
      - task: vet
      - task: test

  build:all:
    desc: Cross-compile binaries for all platforms into bin/
    cmds:
      - mkdir -p bin
      - |
        for target in darwin/arm64 darwin/amd64 linux/amd64 linux/arm64 windows/amd64; do
          os="${target%/*}"
          arch="${target#*/}"
          suffix=""
          [[ "$os" == "windows" ]] && suffix=".exe"
          out="bin/agent-runtime-${os}-${arch}${suffix}"
          echo "Building $out"
          GOOS="$os" GOARCH="$arch" CGO_ENABLED=0 go build \
            -trimpath \
            -ldflags="-s -w -X main.version=dev" \
            -o "$out" \
            {{.CMD}}
        done

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf bin/
